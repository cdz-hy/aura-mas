<!DOCTYPE html>
<html lang="zh-CN" style="height: 100%; margin: 0; padding: 0; overflow: hidden;">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Knowledge Graph</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: transparent;
            -webkit-tap-highlight-color: rgba(0,0,0,0);
        }
        #chart-container {
            position: absolute;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: transparent;
        }
    </style>
    <!-- Load ECharts from Local Asset -->
    <script src="echarts.min.js"></script>
</head>
<body style="height: 100%; margin: 0;">
    <div id="chart-container"></div>
    <div id="error-display" style="display:none; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); color:#ef4444; font-size:14px; text-align:center; font-family:sans-serif; padding:20px;"></div>
    <script>
        var myChart = null;
        try {
            if (typeof echarts === 'undefined') {
                throw new Error('ECharts library failed to load');
            }
            myChart = echarts.init(document.getElementById('chart-container'), null, { renderer: 'canvas', useDirtyRect: false });
        } catch (e) {
            document.getElementById('error-display').style.display = 'block';
            document.getElementById('error-display').textContent = 'Graph init error: ' + e.message;
            console.error('ECharts init error: ' + e.message);
        }
        
        // ─── Constants & Color Helpers ───
        var RELATION_CN = {
            is_a: '属于', part_of: '包含', uses: '使用', related_to: '相关',
            has_pattern: '模式', has_principle: '原则', has_component: '组件',
            prerequisite_for: '前置', has_layer: '层级', enables: '支撑',
            implements: '实现', implemented_by: '实现于', supersedes: '取代',
            manages: '管理', monitors: '监控', contains: '包含', defines: '定义',
            has_subsystem: '子系统', has_pillar: '支柱', supports: '支持',
            modeled_by: '建模于', designed: '设计', has_project: '项目',
            platform_for: '平台', has_activity: '活动', documented_on: '记录于',
            drives: '驱动', center_of: '核心', appears_in: '出现于',
            executes_in: '执行于', provides: '提供', includes: '包括',
            used_in: '应用于', used_by: '使用于', depends_on: '依赖于',
            based_on: '基于', applied_in: '应用于', requires: '需要',
            extends: '扩展/继承', improves: '改进', optimizes: '优化',
            belongs_to: '属于', features: '特性', examples: '示例',
            integrated_with: '集成于', runs_on: '运行于', managed_by: '受管于',
            configured_by: '配置于', deployed_on: '部署于', tests: '测试',
            analyzes: '分析', generates: '生成', process: '处理',
            alternative_to: '替代方案', similar_to: '类似于', composed_of: '组成',
        };

        var relationColorGroups = {
            structure: {
                label: '层级结构',
                color: '#4a90d9',
                rels: ['part_of', 'has_component', 'has_layer', 'has_subsystem', 'has_pillar', 'includes', '包含', '组成', '层级', '子系统', '包括'],
                lineType: 'solid',
                width: 2.5,
                curveness: 0.15,
                opacity: 0.6,
            },
            dependency: {
                label: '依赖使用',
                color: '#50b86c',
                rels: ['uses', 'enables', 'supports', 'implemented_by', 'implements', 'provides', '使用', '支撑', '支持', '实现于', '实现', '提供', '依赖于', '需要', '应用于', '运行于', '使用于'],
                lineType: 'dashed',
                width: 2,
                curveness: 0.25,
                opacity: 0.55,
                dashPattern: [8, 4],
            },
            semantic: {
                label: '语义关联',
                color: '#e8914a',
                rels: ['related_to', 'is_a', 'modeled_by', 'appears_in', '相关', '属于', '建模于', '出现于', '类似于', '关联'],
                lineType: 'dotted',
                width: 1.8,
                curveness: 0.35,
                opacity: 0.5,
                dashPattern: [3, 3],
            },
            design: {
                label: '设计原则',
                color: '#9b6dd7',
                rels: ['has_principle', 'has_pattern', 'defines', 'has_project', '原则', '模式', '定义', '项目', '特性', '示例'],
                lineType: 'solid',
                width: 2.2,
                curveness: 0.2,
                opacity: 0.55,
            },
            control: {
                label: '约束管控',
                color: '#e05c6c',
                rels: ['monitors', 'contains', 'manages', 'executes_in', '监控', '管理', '执行于', '测试', '处理', '分析', '生成'],
                lineType: 'dashed',
                width: 2,
                curveness: 0.3,
                opacity: 0.5,
                dashPattern: [6, 3],
            },
            evolution: {
                label: '演化替代',
                color: '#d4a944',
                rels: ['supersedes', 'prerequisite_for', 'designed', 'platform_for', 'has_activity', 'documented_on', 'drives', 'center_of', '取代', '前置', '设计', '平台', '活动', '记录于', '驱动', '核心', '替代方案', '改进', '优化', '扩展/继承'],
                lineType: 'dotted',
                width: 1.5,
                curveness: 0.4,
                opacity: 0.45,
                dashPattern: [4, 4],
            },
        };

        function getRelationConfig(rel) {
            if (!rel) return { color: '#8899bb', lineType: 'solid', width: 1.5, curveness: 0.2, opacity: 0.4 };
            var normalized = rel.trim().toLowerCase().replace(/ /g, '_');
            for (var key in relationColorGroups) {
                var group = relationColorGroups[key];
                if (group.rels.indexOf(normalized) !== -1 || group.rels.indexOf(rel) !== -1) {
                    return group;
                }
            }
            return { color: '#8899bb', lineType: 'solid', width: 1.5, curveness: 0.2, opacity: 0.4 };
        }

        function getRelationCN(rel) {
            if (!rel) return '';
            var normalized = rel.trim().toLowerCase().replace(/ /g, '_');
            return RELATION_CN[normalized] || RELATION_CN[rel] || rel.replace(/_/g, ' ');
        }

        function getGroupKey(rel) {
            if (!rel) return 'other';
            var normalized = rel.trim().toLowerCase().replace(/ /g, '_');
            for (var key in relationColorGroups) {
                var group = relationColorGroups[key];
                if (group.rels.indexOf(normalized) !== -1 || group.rels.indexOf(rel) !== -1) {
                    return key;
                }
            }
            return 'other';
        }

        function masteryToColor(mastery) {
            if (mastery >= 0.8) return 'rgb(100,155,100)'; // Sage500
            if (mastery >= 0.6) return 'rgb(16,185,129)';  // Emerald500
            if (mastery >= 0.4) return 'rgb(245,158,11)';  // Amber500
            if (mastery >= 0.2) return 'rgb(59,91,150)';   // Navy500
            return 'rgb(152,174,218)';                    // Navy300
        }

        function lightenColor(colorStr, amount) {
            var match = colorStr.match(/rgb\((\d+),(\d+),(\d+)\)/);
            if (!match) return colorStr;
            var r = Math.min(255, parseInt(match[1]) + amount);
            var g = Math.min(255, parseInt(match[2]) + amount);
            var b = Math.min(255, parseInt(match[3]) + amount);
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }

        var hexToRgb = function(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? 'rgb(' + parseInt(result[1], 16) + ',' + parseInt(result[2], 16) + ',' + parseInt(result[3], 16) + ')' : 'rgb(0,0,0)';
        }

        function darkenColor(colorStr, amount) {
            var match = colorStr.match(/rgb\((\d+),(\d+),(\d+)\)/);
            if (!match) return colorStr;
            var r = Math.max(0, parseInt(match[1]) - amount);
            var g = Math.max(0, parseInt(match[2]) - amount);
            var b = Math.max(0, parseInt(match[3]) - amount);
            return 'rgb(' + r + ',' + g + ',' + b + ')';
        }

        // ─── Core Interface called from Android ───
        window.loadGraphData = function (data, isDarkTheme) {
            try {
                if (!myChart) {
                    console.error('loadGraphData called but myChart is null');
                    document.getElementById('error-display').style.display = 'block';
                    document.getElementById('error-display').textContent = 'ECharts not initialized';
                    return;
                }
                var graphData = typeof data === 'string' ? JSON.parse(data) : data;
                if (!graphData || !graphData.nodes) {
                    console.warn('loadGraphData: no nodes in data', JSON.stringify(data).substring(0, 200));
                    return;
                }
                console.log('loadGraphData: ' + graphData.nodes.length + ' nodes, ' + (graphData.edges ? graphData.edges.length : 0) + ' edges');


                var textColor = isDarkTheme ? '#AEC2E6' : '#2c3e5f';
                var textShadowColor = isDarkTheme ? 'rgba(10,15,26,0.9)' : 'rgba(253,249,240,0.9)';
                var edgeLabelBgColor = isDarkTheme ? 'rgba(30,41,59,0.9)' : 'rgba(253,249,240,0.9)';

                var nodes = graphData.nodes.map(function (n) {
                    var mastery = n.mastery_level || 0;
                    var importance = n.importance || 0.5;
                    var color = masteryToColor(mastery);
                    
                    var size;
                    if (importance >= 0.8) size = 48;
                    else if (importance >= 0.5) size = 34;
                    else size = 22;

                    return {
                        id: String(n.id),
                        name: n.name,
                        symbolSize: size,
                        itemStyle: {
                            color: {
                                type: 'radial', x: 0.4, y: 0.35, r: 0.6,
                                colorStops: [
                                    { offset: 0, color: lightenColor(color, 40) },
                                    { offset: 0.7, color: color },
                                    { offset: 1, color: darkenColor(color, 20) }
                                ]
                            },
                            borderColor: isDarkTheme ? 'rgba(255,255,255,0.4)' : 'rgba(255,255,255,0.7)',
                            borderWidth: importance >= 0.8 ? 3 : 2,
                            shadowBlur: importance >= 0.8 ? 20 : (importance >= 0.5 ? 10 : 4),
                            shadowColor: color.replace('rgb', 'rgba').replace(')', ',0.35)')
                        },
                        label: {
                            show: true,
                            position: 'bottom',
                            distance: 6,
                            formatter: '{b}',
                            fontSize: importance >= 0.8 ? 13 : (importance >= 0.5 ? 11 : 10),
                            color: textColor,
                            fontWeight: importance >= 0.8 ? 'bold' : 'normal',
                            textShadowColor: textShadowColor,
                            textShadowBlur: 3
                        }
                    };
                });

                var edges = (graphData.edges || []).map(function (e) {
                    var rel = e.relationship || '';
                    var config = getRelationConfig(rel);
                    var relCN = getRelationCN(rel);
                    var groupKey = getGroupKey(rel);
                    
                    var lineStyle = {
                        color: config.color,
                        opacity: config.opacity,
                        curveness: config.curveness,
                        width: config.width
                    };
                    
                    if (config.lineType === 'dashed') {
                        lineStyle.type = 'dashed';
                    } else if (config.lineType === 'dotted') {
                        lineStyle.type = 'dotted';
                    }
                    
                    var showLabel = ['structure', 'dependency', 'design'].indexOf(groupKey) !== -1;
                    
                    return {
                        source: String(e.source),
                        target: String(e.target),
                        relationship: rel,
                        label: {
                            show: showLabel,
                            formatter: relCN,
                            fontSize: 9,
                            color: config.color,
                            backgroundColor: edgeLabelBgColor,
                            padding: [2, 6],
                            borderRadius: 4,
                            fontWeight: 'bold'
                        },
                        lineStyle: lineStyle
                    };
                });

                var option = {
                    backgroundColor: 'transparent',
                    animationDuration: 800,
                    animationEasing: 'cubicOut',
                    animationDurationUpdate: 300,
                    animationEasingUpdate: 'cubicInOut',
                    series: [
                        {
                            type: 'graph',
                            layout: 'force',
                            data: nodes,
                            links: edges,
                            roam: true,
                            draggable: true,
                            layoutAnimation: true,
                            emphasis: {
                                focus: 'adjacency',
                                lineStyle: { width: 4, opacity: 0.9 },
                                itemStyle: {
                                    borderWidth: 4,
                                    borderColor: '#e8b06a',
                                    shadowBlur: 25
                                },
                                label: { fontWeight: 'bold', fontSize: 14, color: isDarkTheme ? '#FFFFFF' : '#1a2847' },
                                edgeLabel: { show: true, fontWeight: 'bold', fontSize: 11 }
                            },
                            blur: {
                                itemStyle: { opacity: 0.1 },
                                lineStyle: { opacity: 0.03, width: 0.5 },
                                label: { color: isDarkTheme ? 'rgba(255,255,255,0.1)' : 'rgba(44,62,95,0.15)' }
                            },
                            force: {
                                repulsion: 1200,
                                edgeLength: [120, 280],
                                gravity: 0.12,
                                friction: 0.6
                            },
                            lineStyle: { opacity: 0.4 },
                            edgeLabel: { show: false }
                        }
                    ]
                };

                myChart.setOption(option);
            } catch (err) {
                console.error("loadGraphData Error: " + err);
            }
        };

        // ─── Click Listener to Native JavaBridge ───
        if (myChart) {
            myChart.on('click', function (params) {
                if (params.dataType === 'node') {
                    if (window.AndroidInterface && typeof window.AndroidInterface.onNodeClick === 'function') {
                        window.AndroidInterface.onNodeClick(params.data.id);
                    }
                }
            });
        }

        // Window Resize Handler
        window.addEventListener('resize', function() {
            if (myChart) myChart.resize();
        });

        // Report page ready status to Android console
        console.log('echarts_graph.html loaded, myChart=' + (myChart ? 'OK' : 'NULL') + ', echarts=' + (typeof echarts));
    </script>
</body>
</html>

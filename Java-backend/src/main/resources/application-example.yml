# 开发配置模板 - 复制为 application-local.yml 并填入真实值
# application-local.yml 已加入 .gitignore，不会被提交到仓库

server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/learning_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: your-mysql-password
    driver-class-name: com.mysql.cj.jdbc.Driver
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

jwt:
  secret: your-jwt-secret-base64-encoded

internal:
  secret: your-internal-service-secret

minio:
  endpoint: http://localhost:9000
  access-key: your-minio-access-key
  secret-key: your-minio-secret-key
  bucket-name: learning-resources

qiniu:
  access-key: your-qiniu-access-key
  secret-key: your-qiniu-secret-key
  bucket-name: your-bucket-name
  domain: http://your-qiniu-domain

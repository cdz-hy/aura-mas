server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/learning_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: 12344321
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    virtual-host: /

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: Y2xhc3Jvb20tbGVhcm5pbmctc3lzdGVtLWp3dC1zZWNyZXQta2V5LWZvci1oc21hYzI1Ni1hbGdvcml0aG0
  expiration: 86400000
  ticket-expiration: 300000

internal:
  secret: learning-system-internal-service-secret-2024

minio:
  endpoint: http://localhost:9000
  access-key: minioadmin
  secret-key: minioadmin
  bucket-name: learning-resources

qiniu:
  access-key: ${QINIU_ACCESS_KEY:your-qiniu-access-key}
  secret-key: ${QINIU_SECRET_KEY:your-qiniu-secret-key}
  bucket-name: ${QINIU_BUCKET_NAME:your-bucket-name}
  domain: ${QINIU_DOMAIN:http://your-qiniu-domain}

logging:
  level:
    com.learning: debug

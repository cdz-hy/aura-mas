<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>杂志信息图风 - CSS DNA 参考</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <!--
  CSS DNA 参考（给 AI 看的）

  这不是模板，不要复制 HTML 结构。
  AI 读取 CSS 变量和组件类，然后：
  1. 为每个 beat 编写独立 CSS 类（如 b1-left, b2-grid）
  2. 为每个 beat 编写独立 GSAP timeline 动画
  3. .beat 用 position:absolute;inset:0 撑满画布，不加 padding
  4. 内部容器自行设 padding 和布局，加 overflow:hidden
  5. body 背景色必须与 stage 主背景色相同
  6. stage 用固定像素（1920x1080 或 1440x1080）+ JS transform:scale() 缩放
  7. 导航栏放在 #stage 内部，用 position:absolute，禁止 fixed
  8. 字号下限（16:9）：标题 >= 96px，正文 >= 25px，标签 >= 18px
  9. 视觉重心：每个 beat 必须有一个主导元素显著大于其他。图文 beat 截图 >= 40% 面积或标题 >= 正文 3 倍；纯文字 beat 主标题 >= 120px。禁止所有元素同等大小平铺
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');

    :root {
      --bg: #faf9f6;
      --fg: #141414;
      --soft: rgba(20,20,20,.56);
      --muted: rgba(20,20,20,.32);
      --accent: #b91c1c;
      --accent-bg: rgba(185,28,28,.06);
      --teal: #0f766e;
      --teal-bg: rgba(15,118,110,.06);
      --rule: rgba(0,0,0,.1);
      --serif: "Noto Serif SC","Source Han Serif SC",Georgia,serif;
      --sans: Inter,"Noto Sans SC",-apple-system,system-ui,sans-serif;
    }

    *{box-sizing:border-box;margin:0}

    body{
      min-height:100vh;display:grid;place-items:center;
      background:var(--bg);color:var(--fg);font-family:var(--sans);
      overflow:hidden;
    }

    #stage{
      width:1920px;height:1080px;
      position:relative;overflow:hidden;background:var(--bg);
      box-shadow:0 20px 80px rgba(50,40,25,.14);
      transform-origin:center center;
    }

    .beat{position:absolute;inset:0;display:none}
    .beat.active{display:grid}

    /* ── 风格组件（杂志编辑风 DNA） ── */

    .kicker{
      font-size:clamp(11px,1vw,15px);color:var(--accent);
      letter-spacing:.1em;text-transform:uppercase;font-weight:700;
    }
    .headline{
      font-family:var(--serif);
      font-size:clamp(36px,5.2vw,80px);
      font-weight:900;line-height:1.06;letter-spacing:-.01em;
    }
    .headline-sans{
      font-size:clamp(26px,3.2vw,52px);font-weight:700;line-height:1.15;
    }
    .sub-text{
      font-size:clamp(15px,1.4vw,24px);color:var(--soft);
      line-height:1.55;max-width:560px;
    }
    .body-text{
      font-size:clamp(14px,1.3vw,22px);color:var(--soft);line-height:1.55;
    }
    .rule-line{
      width:100%;height:1px;background:var(--rule);transform-origin:left center;
    }
    .accent-word{color:var(--accent);font-weight:700}
    .teal-word{color:var(--teal);font-weight:700}
    .contrast-mark{
      display:inline;background:var(--accent-bg);
      padding:2px 6px;color:var(--accent);font-weight:700;
    }
    .big-num{
      font-family:var(--serif);
      font-size:clamp(64px,10vw,160px);
      font-weight:900;line-height:.85;letter-spacing:-.03em;
    }
    .crop-frame{overflow:hidden;position:relative}
    .crop-frame img{width:100%;height:100%;object-fit:cover;display:block}

    .os-visual{
      display:grid;place-content:center;overflow:hidden;position:relative;
    }
    .os-visual.dark{background:var(--fg);color:var(--bg)}
    .os-visual.tinted{background:#e8e3db}

    .pq-text{
      font-family:var(--serif);
      font-size:clamp(32px,4.5vw,68px);
      font-weight:400;line-height:1.35;
      padding-left:4vw;position:relative;text-align:left;
    }
    .pq-bar{
      position:absolute;left:0;top:0;width:4px;height:100%;
      background:var(--accent);transform-origin:top center;
    }
    .pq-source{
      font-family:var(--sans);
      font-size:clamp(13px,1.1vw,18px);
      color:var(--muted);padding-left:4vw;margin-top:3vh;text-align:left;
    }

    .ne-item{
      display:grid;grid-template-columns:clamp(48px,4vw,72px) 1fr;
      gap:2vw;align-items:baseline;
      padding:2.5vh 0;border-top:1px solid var(--rule);
    }
    .ne-item:last-child{border-bottom:1px solid var(--rule)}
    .ne-num{
      font-family:var(--serif);
      font-size:clamp(28px,3vw,48px);
      font-weight:900;color:var(--accent);line-height:1;
    }
    .ne-text{font-size:clamp(18px,1.8vw,30px);line-height:1.35}
    .ne-sub{
      font-size:clamp(13px,1.2vw,20px);color:var(--soft);
      margin-top:.5vh;line-height:1.4;
    }

    .se-side{
      padding:7vh 5vw;display:grid;align-content:center;gap:2vh;
      background:var(--accent-bg);
    }
    .se-side.teal{background:var(--teal-bg)}
    .se-side-title{
      font-size:clamp(12px,1vw,16px);font-weight:700;
      color:var(--accent);letter-spacing:.06em;text-transform:uppercase;
    }
    .se-side.teal .se-side-title{color:var(--teal)}
    .se-side-body{
      font-family:var(--serif);
      font-size:clamp(18px,2vw,32px);line-height:1.3;
    }
    .se-side-note{
      font-size:clamp(13px,1.1vw,18px);color:var(--soft);line-height:1.5;
    }

    .stat-block{padding:2.5vh 0;border-top:2px solid var(--fg)}
    .stat-num{
      font-family:var(--serif);
      font-size:clamp(44px,5.5vw,88px);font-weight:900;line-height:1;
    }
    .stat-num.bright{color:var(--accent)}
    .stat-label{
      font-size:clamp(14px,1.3vw,22px);color:var(--soft);
      margin-top:1vh;line-height:1.4;
    }

    .bar-group{display:flex;flex-direction:column;gap:2vh}
    .bar-row{
      display:grid;grid-template-columns:clamp(60px,7vw,100px) 1fr auto;
      gap:1.5vw;align-items:center;
    }
    .bar-label{font-size:clamp(13px,1.2vw,20px);text-align:right}
    .bar-track{
      height:clamp(16px,2.5vh,28px);background:rgba(0,0,0,.04);overflow:hidden;
    }
    .bar-fill{
      height:100%;background:var(--accent);width:0%;transform-origin:left center;
    }
    .bar-value{
      font-size:clamp(14px,1.3vw,22px);font-weight:700;
      color:var(--accent);min-width:3.5vw;
    }

    .flow-row{display:flex;align-items:center;gap:1.2vw;flex-wrap:wrap}
    .flow-step{
      padding:1.5vh 1.8vw;border:2px solid var(--fg);
      font-size:clamp(14px,1.4vw,22px);font-weight:600;background:var(--bg);
    }
    .flow-step.active{background:var(--fg);color:var(--bg)}
    .flow-arrow{font-size:clamp(16px,1.5vw,24px);color:var(--muted)}

    .tag{
      display:inline-block;font-size:clamp(11px,1vw,15px);
      padding:4px 12px;font-weight:600;letter-spacing:.03em;
    }
    .tag.red{background:var(--accent-bg);color:var(--accent)}
    .tag.teal{background:var(--teal-bg);color:var(--teal)}
    .tag.outline{border:1px solid var(--rule);color:var(--soft)}

    .cl-rule{
      width:80px;height:2px;background:var(--fg);
      margin:0 auto;transform-origin:center;
    }
    .cl-text{
      font-family:var(--serif);
      font-size:clamp(36px,5vw,80px);
      font-weight:700;line-height:1.25;margin:3.5vh 0;
    }
    .cl-sub{
      font-size:clamp(15px,1.5vw,24px);color:var(--soft);line-height:1.5;
    }

    .hint{
      position:absolute;right:18px;bottom:12px;
      opacity:.1;font-size:11px;color:var(--muted);
    }
  </style>
</head>
<body>
<main id="stage" aria-live="polite">
  <!-- AI 为每个 beat 编写独立的 <section class="beat"> -->
  <div class="hint">Click / Space / →</div>
</main>

<script>
const beats = [...document.querySelectorAll('.beat')];
let current = 0;

const stage = document.getElementById('stage');
function scaleStage(){
  const s = Math.min(innerWidth/1920, innerHeight/1080);
  stage.style.transform = 'scale('+s+')';
}
scaleStage();
window.addEventListener('resize', scaleStage);

function showBeat(idx) {
  current = Math.max(0, Math.min(idx, beats.length - 1));
  beats.forEach((b, i) => b.classList.toggle('active', i === current));
  animateBeat(beats[current]);
}

function kill(beat) {
  gsap.killTweensOf(beat.querySelectorAll('*'));
  gsap.set(beat.querySelectorAll('*'), { clearProps: 'all' });
}

// AI 在这里编写 animateBeat(beat) 函数，为每个 beat 定制 GSAP timeline

document.getElementById('stage').addEventListener('click', () => showBeat(current + 1));
window.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); showBeat(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'Backspace') { e.preventDefault(); showBeat(current - 1); }
});

if (beats[0]) { beats[0].classList.add('active'); }
</script>
</body>
</html>

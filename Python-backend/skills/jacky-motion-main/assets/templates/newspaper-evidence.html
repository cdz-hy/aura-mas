<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>报纸剪贴纪实风 - CSS DNA 参考</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <!--
  CSS DNA 参考（给 AI 看的）

  这不是模板，不要复制 HTML 结构。
  AI 读取 CSS 变量和组件类，然后：
  1. 为每个 beat 编写独立 CSS 类（如 b1-left, b2-grid）
  2. 为每个 beat 编写独立 GSAP timeline 动画
  3. .beat 用 position:absolute;inset:0 撑满画布，不加 padding
  4. 内部容器自行设 padding 和布局，加 overflow:hidden
  5. body 背景色必须与 stage 主背景色相同
  6. stage 用固定像素（1920x1080 或 1440x1080）+ JS transform:scale() 缩放
  7. 导航栏放在 #stage 内部，用 position:absolute，禁止 fixed
  8. 字号下限（16:9）：标题 >= 96px，正文 >= 25px，标签 >= 18px
  9. 视觉重心：每个 beat 必须有一个主导元素显著大于其他。图文 beat 截图 >= 40% 面积或标题 >= 正文 3 倍；纯文字 beat 主标题 >= 120px。禁止所有元素同等大小平铺
  -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500;700&display=swap');

    :root {
      --bg: #f5f0e8;
      --bg-dark: #e8e0d0;
      --fg: #1a1a1a;
      --soft: rgba(26,26,26,.6);
      --muted: rgba(26,26,26,.35);
      --accent: #dc2626;
      --accent-yellow: #fde047;
      --accent-red: #dc2626;
      --paper: #faf8f3;
      --tape: rgba(255,235,150,.45);
      --shadow: rgba(0,0,0,.12);
      --serif: "Noto Serif SC","Source Han Serif SC",Georgia,serif;
      --sans: "Noto Sans SC",Inter,-apple-system,system-ui,sans-serif;
      --mono: "JetBrains Mono","Courier New",monospace;
    }

    *{box-sizing:border-box;margin:0}

    body{
      min-height:100vh;display:grid;place-items:center;
      background:var(--bg);color:var(--fg);font-family:var(--serif);
      overflow:hidden;
    }

    #stage{
      width:1920px;height:1080px;
      position:relative;overflow:hidden;background:var(--bg);
      background-image:
        radial-gradient(circle at 20% 80%,rgba(0,0,0,.03) 0%,transparent 50%),
        repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(0,0,0,.015) 28px,rgba(0,0,0,.015) 29px);
      transform-origin:center center;
    }

    .beat{position:absolute;inset:0;display:none}
    .beat.active{display:grid}

    /* ── 风格组件（纸张纪实风 DNA） ── */

    .clipping{
      background:var(--paper);padding:2.5vh 2.5vw;
      box-shadow:2px 3px 8px var(--shadow),-1px -1px 0 rgba(0,0,0,.04);
      position:relative;
      transform:rotate(var(--rotate,0deg));
    }
    .clipping::before{
      content:'';position:absolute;top:-6px;left:20%;
      width:60px;height:18px;background:var(--tape);
      transform:rotate(-2deg);border-radius:1px;
    }
    .clipping.torn-edge{
      clip-path:polygon(0 0,98% 1%,100% 4%,99% 100%,2% 99%,0 97%);
    }
    .clipping.no-tape::before{display:none}

    .source-label{
      font-family:var(--sans);font-size:clamp(11px,1vw,16px);
      color:var(--muted);letter-spacing:.04em;
    }
    .date-stamp{
      font-family:var(--mono);font-size:clamp(10px,.9vw,14px);
      color:var(--muted);border:1px solid rgba(0,0,0,.15);
      padding:2px 8px;display:inline-block;
    }
    .kicker{
      font-family:var(--sans);font-size:clamp(11px,1vw,15px);
      color:var(--accent-red);letter-spacing:.08em;
      text-transform:uppercase;font-weight:700;
    }
    .headline{
      font-size:clamp(32px,5vw,80px);font-weight:900;line-height:1.12;
      max-width:90%;
    }
    .headline-sans{
      font-family:var(--sans);
      font-size:clamp(24px,3vw,48px);font-weight:700;line-height:1.15;
    }
    .sub-text{
      font-family:var(--sans);font-size:clamp(15px,1.5vw,26px);
      color:var(--soft);line-height:1.5;max-width:70%;
    }
    .body-text{
      font-family:var(--sans);font-size:clamp(14px,1.3vw,22px);
      color:var(--soft);line-height:1.55;
    }
    .highlight-mark{
      background:linear-gradient(180deg,transparent 55%,var(--accent-yellow) 55%,var(--accent-yellow) 90%,transparent 90%);
      padding:0 4px;background-size:0% 100%;background-repeat:no-repeat;
    }
    .highlight-mark.show{background-size:100% 100%}

    .red-annotation{position:relative;display:inline-block}
    .red-annotation::after{
      content:'';position:absolute;inset:-4px -6px;
      border:2.5px solid var(--accent-red);border-radius:3px;
      opacity:0;transform:scale(.92);
    }
    .red-circle{
      position:absolute;border:2.5px solid var(--accent-red);
      border-radius:50%;pointer-events:none;opacity:0;
    }
    .pencil-arrow{
      position:absolute;color:var(--accent-red);
      font-size:clamp(18px,2vw,32px);opacity:0;
    }
    .evidence-number{
      font-family:var(--mono);font-size:clamp(14px,1.2vw,20px);
      color:var(--accent-red);font-weight:700;
    }
    .stamp{
      display:inline-block;font-family:var(--sans);
      font-size:clamp(12px,1.1vw,18px);font-weight:700;
      color:var(--accent-red);border:2px solid var(--accent-red);
      padding:2px 10px;transform:rotate(-4deg);opacity:.7;
      letter-spacing:.05em;
    }
    .accent-word{color:var(--accent-red);font-weight:700}
    .red-line-through{
      text-decoration:line-through;text-decoration-color:var(--accent-red);
      text-decoration-thickness:2.5px;
    }
    .contra-vs{
      font-family:var(--sans);font-size:clamp(16px,1.8vw,28px);
      font-weight:700;color:var(--accent-red);
      writing-mode:vertical-lr;text-align:center;
    }

    .figure-frame{
      background:var(--paper);padding:1.5vh;
      box-shadow:3px 4px 12px var(--shadow);
      border:1px solid rgba(0,0,0,.06);
    }
    .figure-frame img{width:100%;display:block}
    .figure-placeholder{
      width:100%;aspect-ratio:3/4;
      background:var(--bg-dark);display:grid;place-content:center;
      font-family:var(--sans);font-size:clamp(13px,1.2vw,20px);color:var(--muted);
    }

    .tl-line{
      width:100%;height:2px;
      border-top:2px dashed var(--muted);transform-origin:left center;
    }

    .hint{
      position:absolute;right:18px;bottom:12px;
      opacity:.12;font-size:11px;font-family:var(--sans);color:var(--muted);
    }
  </style>
</head>
<body>
<main id="stage" aria-live="polite">
  <!-- AI 为每个 beat 编写独立的 <section class="beat"> -->
  <div class="hint">Click / Space / →</div>
</main>

<script>
const beats = [...document.querySelectorAll('.beat')];
let current = 0;

const stage = document.getElementById('stage');
function scaleStage(){
  const s = Math.min(innerWidth/1920, innerHeight/1080);
  stage.style.transform = 'scale('+s+')';
}
scaleStage();
window.addEventListener('resize', scaleStage);

function showBeat(idx) {
  current = Math.max(0, Math.min(idx, beats.length - 1));
  beats.forEach((b, i) => b.classList.toggle('active', i === current));
  animateBeat(beats[current]);
}

function kill(beat) {
  gsap.killTweensOf(beat.querySelectorAll('*'));
  gsap.set(beat.querySelectorAll('*'), { clearProps: 'all' });
}

// AI 在这里编写 animateBeat(beat) 函数，为每个 beat 定制 GSAP timeline

document.getElementById('stage').addEventListener('click', () => showBeat(current + 1));
window.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'ArrowRight') { e.preventDefault(); showBeat(current + 1); }
  if (e.key === 'ArrowLeft' || e.key === 'Backspace') { e.preventDefault(); showBeat(current - 1); }
});

if (beats[0]) { beats[0].classList.add('active'); }
</script>
</body>
</html>

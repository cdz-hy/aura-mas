<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AURA 多智能体系统 - 测试</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; height: 100vh; display: flex; }
        .sidebar { width: 280px; background: #fff; border-right: 1px solid #e8e8e8; padding: 16px; overflow-y: auto; }
        .sidebar h3 { margin-bottom: 12px; color: #333; }
        .sidebar label { display: block; margin-bottom: 4px; font-size: 13px; color: #666; }
        .sidebar input, .sidebar select { width: 100%; padding: 6px 8px; border: 1px solid #d9d9d9; border-radius: 4px; margin-bottom: 10px; font-size: 13px; }
        .main { flex: 1; display: flex; flex-direction: column; }
        .header { background: #1890ff; color: #fff; padding: 12px 20px; font-size: 16px; font-weight: 600; }
        .chat-area { flex: 1; overflow-y: auto; padding: 16px; }
        .message { margin-bottom: 12px; max-width: 80%; }
        .message.user { margin-left: auto; }
        .message .bubble { padding: 10px 14px; border-radius: 8px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
        .message.user .bubble { background: #1890ff; color: #fff; border-bottom-right-radius: 2px; }
        .message.ai .bubble { background: #fff; color: #333; border: 1px solid #e8e8e8; border-bottom-left-radius: 2px; }
        .message .meta { font-size: 11px; color: #999; margin-top: 4px; }
        .message.user .meta { text-align: right; }
        .event-log { background: #1e1e1e; color: #d4d4d4; padding: 12px; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; max-height: 200px; overflow-y: auto; }
        .event-log .event { margin-bottom: 4px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .event-log .event-type { color: #569cd6; }
        .event-log .agent-name { color: #4ec9b0; }
        .event-log .step { color: #ce9178; }
        .input-area { display: flex; padding: 12px 16px; background: #fff; border-top: 1px solid #e8e8e8; }
        .input-area input { flex: 1; padding: 8px 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px; }
        .input-area button { margin-left: 8px; padding: 8px 20px; background: #1890ff; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px; }
        .input-area button:disabled { background: #d9d9d9; cursor: not-allowed; }
        .thinking { color: #999; font-style: italic; }
        .agent-tag { display: inline-block; padding: 2px 6px; border-radius: 3px; font-size: 11px; margin-right: 4px; }
        .agent-tag.controller { background: #fff7e6; color: #d48806; }
        .agent-tag.task_decomposer { background: #f6ffed; color: #389e0d; }
        .agent-tag.rag_retriever { background: #e6f7ff; color: #096dd9; }
        .agent-tag.reviewer { background: #fff1f0; color: #cf1322; }
        .agent-tag.content_orchestrator { background: #f9f0ff; color: #722ed1; }
        .agent-tag.simple_answer { background: #e6fffb; color: #08979c; }
        .tabs { display: flex; background: #fff; border-bottom: 1px solid #e8e8e8; }
        .tab { padding: 8px 16px; cursor: pointer; font-size: 13px; color: #666; border-bottom: 2px solid transparent; }
        .tab.active { color: #1890ff; border-bottom-color: #1890ff; }
        .panel { display: none; }
        .panel.active { display: flex; flex-direction: column; flex: 1; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h3>配置</h3>
        <label>用户ID</label>
        <input type="number" id="userId" value="1">
        <label>计划ID (可选)</label>
        <input type="number" id="planId" value="">
        <label>会话ID</label>
        <input type="text" id="sessionId" value="">
        <hr style="margin: 12px 0;">
        <h3>快速测试</h3>
        <button onclick="sendPreset('我想学习机器学习')" style="width:100%;margin-bottom:6px;padding:6px;background:#52c41a;color:#fff;border:none;border-radius:4px;cursor:pointer;">生成学习资源</button>
        <button onclick="sendPreset('什么是梯度下降？')" style="width:100%;margin-bottom:6px;padding:6px;background:#1890ff;color:#fff;border:none;border-radius:4px;cursor:pointer;">简单问答</button>
        <button onclick="sendPreset('帮我出几道机器学习的题目')" style="width:100%;margin-bottom:6px;padding:6px;background:#722ed1;color:#fff;border:none;border-radius:4px;cursor:pointer;">生成题目</button>
        <button onclick="sendPreset('确认')" style="width:100%;margin-bottom:6px;padding:6px;background:#fa8c16;color:#fff;border:none;border-radius:4px;cursor:pointer;">确认任务分解</button>
    </div>
    <div class="main">
        <div class="header">AURA 多智能体学习系统</div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('chat')">对话</div>
            <div class="tab" onclick="switchTab('events')">事件日志</div>
        </div>
        <div id="chatPanel" class="panel active">
            <div class="chat-area" id="chatArea"></div>
        </div>
        <div id="eventsPanel" class="panel">
            <div class="event-log" id="eventLog"></div>
        </div>
        <div class="input-area">
            <input type="text" id="messageInput" placeholder="输入消息..." onkeypress="if(event.key==='Enter')sendMessage()">
            <button id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>

    <script>
        const API_BASE = '/api/v1/agent';
        let currentController = null;

        // 生成会话ID
        document.getElementById('sessionId').value = 'sess_' + Date.now();

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            if (tab === 'chat') {
                document.querySelector('.tab:nth-child(1)').classList.add('active');
                document.getElementById('chatPanel').classList.add('active');
            } else {
                document.querySelector('.tab:nth-child(2)').classList.add('active');
                document.getElementById('eventsPanel').classList.add('active');
            }
        }

        function addMessage(role, content, agent = '') {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = `message ${role}`;
            const agentTag = agent ? `<span class="agent-tag ${agent}">${agent}</span>` : '';
            div.innerHTML = `
                <div class="bubble">${agentTag}${escapeHtml(content)}</div>
                <div class="meta">${new Date().toLocaleTimeString()}</div>
            `;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
            return div;
        }

        function addStreamMessage(agent) {
            const area = document.getElementById('chatArea');
            const div = document.createElement('div');
            div.className = 'message ai';
            div.innerHTML = `
                <div class="bubble"><span class="agent-tag ${agent}">${agent}</span><span class="content thinking">思考中...</span></div>
                <div class="meta">${new Date().toLocaleTimeString()}</div>
            `;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
            return div;
        }

        function addEvent(eventType, agent, stepDesc) {
            const log = document.getElementById('eventLog');
            const div = document.createElement('div');
            div.className = 'event';
            div.innerHTML = `<span class="event-type">[${eventType}]</span> <span class="agent-name">${agent}</span> <span class="step">${stepDesc}</span>`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
        }

        function sendPreset(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            if (!message) return;

            const userId = parseInt(document.getElementById('userId').value) || 1;
            const planIdVal = document.getElementById('planId').value;
            const planId = planIdVal ? parseInt(planIdVal) : null;
            const sessionId = document.getElementById('sessionId').value;

            addMessage('user', message);
            input.value = '';

            const sendBtn = document.getElementById('sendBtn');
            sendBtn.disabled = true;

            // 判断是确认还是普通对话
            const isConfirm = ['确认', '可以', '没问题', '同意', '好的', 'ok'].some(kw => message.toLowerCase().includes(kw));
            const endpoint = isConfirm ? '/confirm' : '/chat';

            try {
                const response = await fetch(API_BASE + endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: userId,
                        plan_id: planId,
                        session_id: sessionId,
                        message: message,
                        human_feedback: isConfirm ? message : null,
                    })
                });

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let buffer = '';
                let currentStreamMsg = null;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    buffer += decoder.decode(value, { stream: true });
                    const lines = buffer.split('\n');
                    buffer = lines.pop();

                    for (const line of lines) {
                        if (!line.startsWith('data: ')) continue;
                        try {
                            const data = JSON.parse(line.slice(6));
                            addEvent(data.event_type, data.agent, data.step_description || '');

                            if (data.event_type === 'content') {
                                const text = data.data.text || data.data.delta || '';
                                if (text) {
                                    if (!currentStreamMsg) {
                                        currentStreamMsg = addStreamMessage(data.agent);
                                    }
                                    const contentSpan = currentStreamMsg.querySelector('.content');
                                    contentSpan.classList.remove('thinking');
                                    contentSpan.textContent += text;
                                }
                            } else if (data.event_type === 'task_breakdown') {
                                currentStreamMsg = null;
                                const tb = data.data;
                                let content = `学习路径规划: ${tb.title}\n${tb.description}\n\n模块:\n`;
                                (tb.modules || []).forEach((m, i) => {
                                    content += `${i+1}. ${m.title} - ${m.description}\n`;
                                });
                                addMessage('ai', content, 'task_decomposer');
                            } else if (data.event_type === 'quiz') {
                                currentStreamMsg = null;
                                const quiz = data.data;
                                let content = `测验: ${quiz.quiz_title}\n\n`;
                                (quiz.questions || []).forEach((q, i) => {
                                    content += `${i+1}. [${q.question_type}] ${q.question_text}\n`;
                                    if (q.options) q.options.forEach(o => content += `   ${o}\n`);
                                    content += `   答案: ${q.correct_answer}\n\n`;
                                });
                                addMessage('ai', content, 'quiz_generator');
                            } else if (data.event_type === 'quiz_result') {
                                currentStreamMsg = null;
                                const r = data.data;
                                addMessage('ai', `得分: ${(r.score * 100).toFixed(0)}%\n${r.feedback}`, 'quiz_grader');
                            } else if (data.event_type === 'confirm_needed') {
                                currentStreamMsg = null;
                                addMessage('ai', '学习路径已生成，请确认或补充说明（输入"确认"或补充内容）', 'system');
                            } else if (data.event_type === 'done') {
                                currentStreamMsg = null;
                            } else if (data.event_type === 'error') {
                                currentStreamMsg = null;
                                addMessage('ai', `错误: ${data.data.error}`, 'system');
                            }
                        } catch (e) {}
                    }
                }
            } catch (e) {
                addMessage('ai', `请求失败: ${e.message}`, 'system');
            } finally {
                sendBtn.disabled = false;
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
